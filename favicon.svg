<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Dark background tile -->
  <rect width="64" height="64" rx="14" fill="#0b0f1a"/>
  <!-- Circle ring -->
  <circle cx="32" cy="32" r="27" stroke="#F5C518" stroke-width="3.5" fill="none"/>
  <!-- Horizontal chili body crossing the ring - tapers at left, pointed at right -->
  <path d="M4 32 C8 25 16 23 24 25 L46 27 C52 27.5 58 29.5 60 32 C58 34.5 52 36.5 46 37 L24 39 C16 41 8 39 4 32Z" fill="#F5C518"/>
  <!-- Chili pointed tip / slight curl right -->
  <path d="M60 32 C63 31 65 29 64 27" stroke="#F5C518" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <!-- Stem left -->
  <path d="M4 32 C2 29 1 26 3 24" stroke="#F5C518" stroke-width="2" stroke-linecap="round" fill="none"/>
  <!-- "Chilies" text on the chili body -->
  <text x="32" y="36.5" text-anchor="middle" font-family="Arial Black, Impact, sans-serif" font-weight="900" font-size="10" fill="#0b0f1a" letter-spacing="0.5">Chilies</text>
</svg>
